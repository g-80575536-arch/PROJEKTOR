<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempahan Projektor SK Krangan</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        .info-box { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #1a73e8; }
        
        .warning-text { 
            background-color: #fff3cd; 
            color: #856404; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #ffeeba; 
            font-size: 13px; 
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; margin-top: 25px; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .table-container { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <img src="LOGO_SEKOLAH.png" alt="Logo Sekolah" style="width: 100px; height: auto; margin-bottom: 10px;">
    </div>
    
    <h2>Borang Tempahan Projektor</h2>
    
    <div class="info-box">
        UNIT ICT SK KRANGAN
    </div>

    <div class="warning-text">
        ⚠️ <strong>PERHATIAN:</strong> Sila rujuk <b>Rekod Tempahan</b> di bahagian bawah halaman ini sebelum mengisi borang untuk mengelakkan pertindihan waktu penggunaan.
    </div>
    
    <label>Nama Guru:</label>
    <input type="text" id="namaGuru" placeholder="Nama penuh anda">
    
    <label>Tujuan Penggunaan:</label>
    <input type="text" id="tujuan" placeholder="Contoh: PdPC / Taklimat / Mesyuarat">

    <label>Lokasi Penggunaan:</label>
    <input type="text" id="lokasi" placeholder="Contoh: Kelas 4 Gemilang / Bilik Mesyuarat">

    <label>Tarikh & Masa Penggunaan:</label>
    <input type="datetime-local" id="tarikhMasa">
    
    <button id="btnHantar" onclick="tambahBooking()">Hantar Tempahan</button>

    <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">

    <h3>Rekod Tempahan</h3>
    <div class="table-container">
        <table id="jadualBooking">
            <thead>
                <tr>
                    <th>Guru</th>
                    <th>Tujuan</th>
                    <th>Lokasi</th>
                    <th>Waktu</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    async function tambahBooking() {
        const btn = document.getElementById('btnHantar');
        const nama = document.getElementById('namaGuru').value;
        const tujuan = document.getElementById('tujuan').value;
        const lokasi = document.getElementById('lokasi').value;
        const masa = document.getElementById('tarikhMasa').value;

        if (!nama || !tujuan || !lokasi || !masa) {
            alert("Sila lengkapkan semua maklumat tempahan!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Menghantar...";

        const dataTempahan = {
            nama: nama,
            tujuan: tujuan,
            lokasi: lokasi,
            alat: "Projektor Utama",
            masa: masa.replace('T', ' ')
        };

        // URL API BAHARU ANDA (...TL-u4g)
        const urlAPI = "https://script.google.com/macros/s/AKfycbzQZtxuFrI1btphfQd9jQ2W3a4lkNj1r2AruBOlNISDpjMV-hM-wyNZq07fMK5xTL-u4g/exec";

        try {
            // Menghantar data ke Google Sheets
            await fetch(urlAPI, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(dataTempahan),
                headers: { 'Content-Type': 'application/json' }
            });

            // Tambah ke jadual visual
            const jadual = document.getElementById('jadualBooking').getElementsByTagName('tbody')[0];
            const barisBaru = jadual.insertRow(0);
            barisBaru.innerHTML = `
                <td><b>${nama}</b></td>
                <td>${tujuan}</td>
                <td>${lokasi}</td>
                <td>${dataTempahan.masa}</td>
            `;

            alert("Tempahan Berjaya Disimpan!");
            
            // Reset input
            document.getElementById('namaGuru').value = "";
            document.getElementById('tujuan').value = "";
            document.getElementById('lokasi').value = "";
            document.getElementById('tarikhMasa').value = "";

        } catch (error) {
            alert("Ralat sambungan. Sila cuba lagi.");
            console.error("Ralat:", error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Hantar Tempahan";
        }
    }
</script>

</body>
</html>
