<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Projektor Sekolah</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        .info-box { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #1a73e8; }
        
        .warning-text { 
            background-color: #fff3cd; 
            color: #856404; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #ffeeba; 
            font-size: 13px; 
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; margin-top: 25px; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Jadual lebih lebar untuk maklumat tambahan */
        .table-container { overflow-x: auto; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <img src="LOGO_SEKOLAH.png" alt="Logo Sekolah" style="width: 100px; height: auto; margin-bottom: 10px;">
    </div>
    
    <h2>Borang Tempahan Projektor</h2>
    
    <div class="info-box">
        UNIT ICT SK KRANGAN
    </div>

    <div class="warning-text">
        ⚠️ <strong>PERHATIAN:</strong> Sila rujuk <b>Rekod Tempahan</b> di bawah sebelum mengisi untuk mengelakkan pertindihan waktu.
    </div>
