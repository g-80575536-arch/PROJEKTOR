<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Projektor SK Krangan</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        .info-box { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #1a73e8; }
        
        .warning-text { 
            background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; 
            border: 1px solid #ffeeba; font-size: 13px; margin-bottom: 20px; text-align: center;
        }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
        
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .flex-item { flex: 1; min-width: 150px; }

        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; margin-top: 25px; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; }
        
        .table-container { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        tr:nth-child(even) { background-color: #fafafa; }
        #loadingStatus { text-align: center; font-style: italic; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <img src="LOGO_SEKOLAH.png" alt="Logo Sekolah" style="width: 80px; height: auto; margin-bottom: 10px;">
    </div>
    
    <h2>Borang Tempahan Projektor</h2>
    <div class="info-box">UNIT ICT SK KRANGAN</div>

    <div class="warning-text">
        ⚠️ <strong>PERHATIAN:</strong> Sila rujuk rekod di bawah sebelum mengisi untuk mengelak pertindihan waktu.
    </div>
    
    <label>Nama Guru:</label>
    <input type="text" id="namaGuru" placeholder="Nama penuh anda">

    <div class="flex-row">
        <div class="flex-item">
            <label>Tarikh:</label>
            <input type="date" id="tarikh">
        </div>
        <div class="flex-item">
            <label>Masa Guna:</label>
            <input type="time" id="masaGuna">
        </div>
        <div class="flex-item">
            <label>Masa Hantar:</label>
            <input type="time" id="masaHantar">
        </div>
    </div>

    <div class="flex-row">
        <div class="flex-item">
            <label>Lokasi:</label>
            <input type="text" id="lokasi" placeholder="Cth: Kelas 4 Gemilang">
        </div>
        <div class="flex-item">
            <label>Tujuan:</label>
            <input type="text" id="tujuan" placeholder="Cth: PdPC Sains">
        </div>
    </div>
    
    <button id="btnHantar" onclick="tambahBooking()">Hantar Tempahan</button>

    <hr style="margin-top: 40px; border: 0; border-top: 1px solid #eee;">

    <h3>Rekod Tempahan Terkini</h3>
    <div id="loadingStatus">Memuatkan rekod...</div>
    <div class="table-container">
        <table id="jadualBooking">
            <thead>
                <tr>
                    <th>Guru</th>
                    <th>Tarikh</th>
                    <th>Guna</th>
                    <th>Hantar</th>
                    <th>Lokasi</th>
                    <th>Tujuan</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const urlAPI = "https://script.google.com/macros/s/AKfycbx1UztmMkvdZxB48wOGNI7hw4xzPYGNSmF-s9548-T7mV8H9k93Rm7BIS1rMYsGz2qLEQ/exec";

    window.onload = paparRekod;

    async function paparRekod() {
        const tbody = document.querySelector("#jadualBooking tbody");
        const status = document.getElementById('loadingStatus');

        try {
            const res = await fetch(urlAPI);
            const data = await res.json();
            tbody.innerHTML = "";
            
            if (!data || data.length === 0) {
                status.innerText = "Tiada rekod dijumpai.";
            } else {
                status.style.display = "none";
                data.reverse().forEach(item => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><b>${item.nama}</b></td>
                        <td>${item.tarikh}</td>
                        <td>${item.mGuna}</td>
                        <td>${item.mHantar}</td>
                        <td>${item.lokasi}</td>
                        <td>${item.tujuan}</td>
                    `;
                });
            }
        } catch (e) {
            status.innerText = "Gagal memuatkan rekod.";
        }
    }

    async function tambahBooking() {
        const btn = document.getElementById('btnHantar');
        const payload = {
            nama: document.getElementById('namaGuru').value,
            tarikh: document.getElementById('tarikh').value,
            mGuna: document.getElementById('masaGuna').value,
            mHantar: document.getElementById('masaHantar').value,
            lokasi: document.getElementById('lokasi').value,
            tujuan: document.getElementById('tujuan').value
        };

        if (!payload.nama || !payload.tarikh || !payload.mGuna || !payload.mHantar) {
            alert("Sila lengkapkan maklumat penting (Nama, Tarikh, Masa)!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Menghantar...";

        try {
            await fetch(urlAPI, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            alert("Tempahan Berjaya!");
            location.reload(); // Segarkan halaman untuk kemas kini jadual
        } catch (e) {
            alert("Ralat sambungan.");
            btn.disabled = false;
            btn.innerText = "Hantar Tempahan";
        }
    }
</script>

</body>
</html>
